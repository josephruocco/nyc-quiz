<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinpoint the Neighborhood</title>
<style>
  :root {
    --paper: #EAECEF;
    --panel: #F5F6F8;
    --line: #C9CDD3;
    --text: #14161A;
    --dim: #6A7079;
    --water: #DFE3E8;
    --mn: #B65A1F;
    --bk: #1E7A6E;
    --qn: #4A5CB8;
    --bx: #A83A62;
    --si: #6D4AA6;
    --miss: #B02E2E;
    --display: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #101215; --panel: #191C21; --line: #333944; --text: #E7EAEE;
      --dim: #8A929D; --water: #15181C;
      --mn: #E8934F; --bk: #45B8A8; --qn: #8B9BEA; --bx: #E27BA0; --si: #B497E8; --miss: #E56B6B;
    }
  }
  :root[data-theme="light"] {
    --paper: #EAECEF; --panel: #F5F6F8; --line: #C9CDD3; --text: #14161A;
    --dim: #6A7079; --water: #DFE3E8;
    --mn: #B65A1F; --bk: #1E7A6E; --qn: #4A5CB8; --bx: #A83A62; --si: #6D4AA6; --miss: #B02E2E;
  }
  :root[data-theme="dark"] {
    --paper: #101215; --panel: #191C21; --line: #333944; --text: #E7EAEE;
    --dim: #8A929D; --water: #15181C;
    --mn: #E8934F; --bk: #45B8A8; --qn: #8B9BEA; --bx: #E27BA0; --si: #B497E8; --miss: #E56B6B;
  }

  body { background: var(--paper); color: var(--text); font-family: var(--display); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 60px; display: flex; flex-direction: column; gap: 18px; }

  h1 { font-size: clamp(24px, 4vw, 34px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .sub { color: var(--dim); font-size: 14px; max-width: 62ch; line-height: 1.5; margin-top: 6px; }

  /* Fixed rows + a three-line reservation for the name: long NTA names must not
     re-flow the page, or the map jumps under the cursor between rounds. */
  .prompt {
    display: grid; grid-template-columns: 1fr auto; align-items: baseline;
    row-gap: 8px; column-gap: 16px;
    padding: 14px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .target {
    grid-column: 1 / -1;
    font-size: clamp(19px, 3vw, 28px); font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.15; min-height: 3.45em; text-wrap: balance;
  }
  .boro { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--c, var(--dim)); }
  .stats { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 14px; color: var(--dim); }
  .stats b { color: var(--text); font-weight: 500; }

  .stage { position: relative; }
  canvas { display: block; width: 100%; border: 1px solid var(--line); background: var(--water); cursor: crosshair; touch-action: none; }
  canvas.done { cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  .opts { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .opts .spacer { flex: 1; }
  .opts button { font-size: 11px; padding: 11px 13px; }
  .opts button[aria-pressed="true"] { background: var(--text); color: var(--paper); border-color: var(--text); }
  .opts button[data-boro] { border-left: 3px solid var(--bc); }
  .opts button[data-boro][aria-pressed="false"] { color: var(--dim); }
  .zoomlvl { font-family: var(--mono); font-size: 12px; color: var(--dim); min-width: 3.4em; text-align: right; }

  .result { min-height: 40px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; font-size: 15px; }
  .verdict { font-weight: 700; letter-spacing: -0.01em; }
  .verdict.good { color: var(--c); }
  .verdict.bad { color: var(--miss); }
  .detail { color: var(--dim); font-family: var(--mono); font-size: 13px; }

  button {
    font: 600 12px/1 var(--display); letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text); background: transparent; border: 1px solid var(--line);
    border-radius: 2px; padding: 12px 16px; cursor: pointer;
  }
  button:hover { border-color: var(--text); }
  button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  button[hidden] { display: none; }
</style>

<div class="wrap">
  <header>
    <h1>Pinpoint the Neighborhood</h1>
    <p class="sub">Click where you think the named neighborhood sits. Scroll to zoom, drag to pan, and turn the boundaries off if you want it harder. 20 rounds.</p>
  </header>

  <div class="prompt">
    <span class="boro" id="boro">Round 1</span>
    <span class="target" id="target">Loading…</span>
    <span class="stats"><b id="hits">0</b> exact &middot; avg miss <b id="avg">n/a</b></span>
  </div>

  <div class="opts" id="boroOpts" role="group" aria-label="Boroughs included"></div>

  <div class="opts">
    <button id="lines" aria-pressed="true">Boundaries</button>
    <span class="spacer"></span>
    <button id="zoomOut" aria-label="Zoom out">&minus;</button>
    <span class="zoomlvl" id="zoomlvl">1.0&times;</span>
    <button id="zoomIn" aria-label="Zoom in">+</button>
    <button id="reset">Reset view</button>
  </div>

  <div class="stage"><canvas id="map" aria-label="Map of NYC neighborhood boundaries. Click to place your guess, drag to pan, scroll to zoom."></canvas></div>

  <div class="result">
    <span class="verdict" id="verdict"></span>
    <span class="detail" id="detail"></span>
    <button id="next" hidden>Next</button>
  </div>
</div>

<script>
const HOODS = /*DATA*/;
const ROUNDS = 20;
const COLOR = { "Manhattan": "--mn", "Brooklyn": "--bk", "Queens": "--qn", "The Bronx": "--bx", "Staten Island": "--si" };
const BOROS = ["Manhattan", "Brooklyn", "Queens", "The Bronx", "Staten Island"];

const active = new Set(BOROS);
let POOL = HOODS;   // the boroughs currently switched on: drawn, asked, and fitted to

// bbox over every ring in the pool
let minX, maxX, minY, maxY, KX;
function fitBounds() {
  minX = 180; maxX = -180; minY = 90; maxY = -90;
  for (const h of POOL) for (const r of h.p) for (const [x, y] of r) {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  KX = Math.cos((minY + maxY) / 2 * Math.PI / 180); // flatten lon so the city isn't stretched
}
fitBounds();

const cv = document.getElementById("map");
const ctx = cv.getContext("2d");
let scale = 1, offX = 0, offY = 0;

let lastW = 0;
function layout() {
  const w = cv.clientWidth;
  lastW = w;
  // Portrait phones need a tall box; a width-driven ratio collapses the map to a strip.
  const narrow = w < 600;
  const h = Math.round(Math.min(w * (narrow ? 1.2 : 0.72), innerHeight * (narrow ? 0.6 : 0.62)));
  const dpr = devicePixelRatio || 1;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const pad = 12;
  scale = Math.min((w - pad * 2) / ((maxX - minX) * KX), (h - pad * 2) / (maxY - minY));
  offX = (w - (maxX - minX) * KX * scale) / 2;
  offY = (h - (maxY - minY) * scale) / 2;
  draw();
}
let zoom = 1, panX = 0, panY = 0;   // user view layered on the fit-to-canvas projection
const px = ([x, y]) => [
  (offX + (x - minX) * KX * scale) * zoom + panX,
  (offY + (maxY - y) * scale) * zoom + panY,
];

// guess is kept in lon/lat, not screen pixels: the player can zoom and pan after
// answering, and the dot has to stay on the spot they actually clicked.
let round = 0, hits = 0, misses = [], target = null, guess = null, answered = false, inside = false;
let order = [];

function path(rings) {
  ctx.beginPath();
  for (const r of rings) {
    r.forEach((pt, i) => { const [a, b] = px(pt); i ? ctx.lineTo(a, b) : ctx.moveTo(a, b); });
    ctx.closePath();
  }
}
const cssVar = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

function draw() {
  const w = cv.clientWidth, h = parseFloat(cv.style.height);
  ctx.clearRect(0, 0, w, h);
  const showLines = el("lines").getAttribute("aria-pressed") === "true";
  ctx.fillStyle = cssVar("--panel");
  ctx.strokeStyle = cssVar("--line");
  ctx.lineWidth = 0.7;
  for (const hood of POOL) { path(hood.p); ctx.fill(); if (showLines) ctx.stroke(); }

  if (answered && target) {
    const c = cssVar(COLOR[target.b]);
    path(target.p);
    ctx.fillStyle = c + "55";
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();

    if (guess) {
      const [gx, gy] = px(guess);
      const [tx, ty] = px(target.c);
      if (!inside) {
        ctx.strokeStyle = cssVar("--miss");
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(tx, ty); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.fillStyle = inside ? c : cssVar("--miss");
      ctx.beginPath(); ctx.arc(gx, gy, 5, 0, 7); ctx.fill();
    }
  }
  el("zoomlvl").textContent = zoom.toFixed(1) + "×";
}

// even-odd ray cast against the screen-space rings
function hit([mx, my], hood) {
  let inside = false;
  for (const r of hood.p) {
    for (let i = 0, j = r.length - 1; i < r.length; j = i++) {
      const [ax, ay] = px(r[i]), [bx, by] = px(r[j]);
      if ((ay > my) !== (by > my) && mx < ((bx - ax) * (my - ay)) / (by - ay) + ax) inside = !inside;
    }
  }
  return inside;
}

function toLonLat([sx, sy]) {
  const bx = (sx - panX) / zoom, by = (sy - panY) / zoom;
  return [minX + (bx - offX) / (KX * scale), maxY - (by - offY) / scale];
}
function miles(a, b) {
  const dy = (a[1] - b[1]) * 69.0;
  const dx = (a[0] - b[0]) * 69.0 * KX;
  return Math.hypot(dx, dy);
}

const el = id => document.getElementById(id);

function ask() {
  if (round >= order.length) return finish();
  target = order[round];
  guess = null; answered = false;
  cv.classList.remove("done");
  document.documentElement.style.setProperty("--c", `var(${COLOR[target.b]})`);
  el("boro").textContent = `Round ${round + 1} of ${order.length} · ${target.b}`;
  el("target").textContent = target.n;
  el("verdict").textContent = ""; el("detail").textContent = "";
  el("next").hidden = true;
  draw();
}

function finish() {
  target = null; answered = false;
  cv.classList.add("done");
  el("boro").textContent = "Done";
  el("target").textContent = `${hits} of ${order.length} landed inside`;
  el("detail").textContent = misses.length ? `average miss ${avg().toFixed(1)} mi over ${misses.length} misses` : "perfect run";
  el("verdict").textContent = "";
  el("next").hidden = false;
  el("next").textContent = "Play again";
  el("next").onclick = () => location.reload();
  draw();
}

const avg = () => misses.reduce((a, b) => a + b, 0) / misses.length;

function place(sx, sy) {
  if (!target || answered) return;
  const pt = [sx, sy];
  guess = toLonLat(pt);
  answered = true;
  cv.classList.add("done");

  inside = hit(pt, target);
  const d = miles(guess, target.c);
  if (inside) hits++; else misses.push(d);

  el("verdict").textContent = inside ? "Inside it." : "Missed.";
  el("verdict").className = "verdict " + (inside ? "good" : "bad");
  el("detail").textContent = inside
    ? `${d.toFixed(1)} mi from center`
    : `${d.toFixed(1)} mi off, highlighted in ${target.b}`;
  el("hits").textContent = hits;
  el("avg").textContent = misses.length ? avg().toFixed(1) + " mi" : "n/a";
  el("next").hidden = false;
  el("next").textContent = round + 1 >= order.length ? "See results" : "Next";
  el("next").onclick = () => { round++; ask(); };
  el("next").focus();
  draw();
}

// ---- zoom + pan
function zoomAt(factor, cxp, cyp) {
  const next = Math.min(12, Math.max(1, zoom * factor));
  const k = next / zoom;
  panX = cxp - (cxp - panX) * k;
  panY = cyp - (cyp - panY) * k;
  zoom = next;
  clampPan();
  draw();
}
function clampPan() {
  const w = cv.clientWidth, h = parseFloat(cv.style.height);
  const span = 0.35 * Math.min(w, h);   // never let the city leave the frame entirely
  panX = Math.min(span, Math.max(w - w * zoom - span, panX));
  panY = Math.min(span, Math.max(h - h * zoom - span, panY));
  if (zoom === 1) { panX = 0; panY = 0; }
}

cv.addEventListener("wheel", e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  zoomAt(Math.exp(-e.deltaY * 0.0016), e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

el("zoomIn").addEventListener("click", () => zoomAt(1.5, cv.clientWidth / 2, parseFloat(cv.style.height) / 2));
el("zoomOut").addEventListener("click", () => zoomAt(1 / 1.5, cv.clientWidth / 2, parseFloat(cv.style.height) / 2));
el("reset").addEventListener("click", () => { zoom = 1; panX = panY = 0; draw(); });
el("lines").addEventListener("click", () => {
  el("lines").setAttribute("aria-pressed", String(el("lines").getAttribute("aria-pressed") !== "true"));
  draw();
});

// A drag pans; a press that barely moves is a guess. Without the slop threshold
// every pan would also drop a pin wherever the drag ended.
const SLOP = 4;
let drag = null;
cv.addEventListener("pointerdown", e => {
  drag = { x: e.clientX, y: e.clientY, px: panX, py: panY, moved: false };
  cv.setPointerCapture(e.pointerId);
});
cv.addEventListener("pointermove", e => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (!drag.moved && Math.hypot(dx, dy) < SLOP) return;
  drag.moved = true;
  cv.classList.add("dragging");
  panX = drag.px + dx;
  panY = drag.py + dy;
  clampPan();
  draw();
});
cv.addEventListener("pointerup", e => {
  const wasDrag = drag && drag.moved;
  drag = null;
  cv.classList.remove("dragging");
  if (wasDrag) return;
  const r = cv.getBoundingClientRect();
  place(e.clientX - r.left, e.clientY - r.top);
});
cv.addEventListener("pointercancel", () => { drag = null; cv.classList.remove("dragging"); });

// pinch
let pinch = null;
cv.addEventListener("touchmove", e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const [a, b] = e.touches;
  const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  const r = cv.getBoundingClientRect();
  if (pinch) zoomAt(d / pinch, (a.clientX + b.clientX) / 2 - r.left, (a.clientY + b.clientY) / 2 - r.top);
  pinch = d;
}, { passive: false });
cv.addEventListener("touchend", () => { pinch = null; });

// Not window "resize": the canvas also changes width when the page scrollbar comes
// and goes, and a stale projection makes clicks land off from what's drawn.
// ---- borough filter
// Changing the pool changes both the map and the questions, so there's no way to
// keep a run going across a toggle — flipping one starts a fresh run.
function restart() {
  POOL = HOODS.filter(h => active.has(h.b));
  order = POOL.map(h => h).sort(() => Math.random() - 0.5).slice(0, ROUNDS);
  round = 0; hits = 0; misses = []; guess = null; answered = false;
  zoom = 1; panX = 0; panY = 0;
  el("hits").textContent = "0";
  el("avg").textContent = "n/a";
  fitBounds();
  layout();
  ask();
}

for (const b of BOROS) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.dataset.boro = b;
  btn.setAttribute("aria-pressed", "true");
  btn.style.setProperty("--bc", `var(${COLOR[b]})`);
  btn.textContent = b;
  btn.addEventListener("click", () => {
    if (active.has(b) && active.size === 1) return;   // never leave an empty map
    active.has(b) ? active.delete(b) : active.add(b);
    btn.setAttribute("aria-pressed", String(active.has(b)));
    restart();
  });
  el("boroOpts").appendChild(btn);
}

new ResizeObserver(() => { if (cv.clientWidth !== lastW) layout(); }).observe(cv);
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", draw);
restart();

// self-check
console.assert(HOODS.length > 150, "neighborhoods loaded");
console.assert(HOODS.every(h => h.c[0] > -74.3 && h.c[0] < -73.6 && h.c[1] > 40.4 && h.c[1] < 40.95), "centroids inside NYC");
console.assert(HOODS.every(h => hit(px(h.c), h)), "every centroid hit-tests inside its own polygon");
console.assert(BOROS.every(b => HOODS.some(h => h.b === b)), "every borough button has neighborhoods behind it");
console.assert(order.length && order.every(h => active.has(h.b)), "the round list only draws from switched-on boroughs");
// screen<->lonlat must round-trip under an arbitrary zoom/pan, or guesses land off the pin
(() => {
  const [z0, x0, y0] = [zoom, panX, panY];
  zoom = 3.7; panX = -120; panY = 55;
  const back = toLonLat(px(HOODS[0].c));
  console.assert(miles(back, HOODS[0].c) < 0.01, "toLonLat inverts px under zoom/pan");
  console.assert(hit(px(HOODS[0].c), HOODS[0]), "hit-testing still works zoomed in");
  zoom = z0; panX = x0; panY = y0;
})();
</script>
