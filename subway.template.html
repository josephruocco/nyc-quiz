<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinpoint the Line</title>
<style>
  :root {
    --paper: #F2EEE3; --panel: #EBE5D4; --line: #DBD3C0; --text: #23201B; --dim: #6E6757;
    --water: #D8CFB8; --land: #F6F3EA; --rail: #CFC7B2; --miss: #B02E2E;
    --display: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper: #171B18; --panel: #20261F; --line: #333B31; --text: #EFECE1;
            --dim: #9C9585; --water: #10140E; --land: #252C24; --rail: #3A4238; --miss: #E56B6B; }
  }
  :root[data-theme="light"] {
    --paper: #F2EEE3; --panel: #EBE5D4; --line: #DBD3C0; --text: #23201B; --dim: #6E6757;
    --water: #D8CFB8; --land: #F6F3EA; --rail: #CFC7B2; --miss: #B02E2E;
  }
  :root[data-theme="dark"] {
    --paper: #171B18; --panel: #20261F; --line: #333B31; --text: #EFECE1;
    --dim: #9C9585; --water: #10140E; --land: #252C24; --rail: #3A4238; --miss: #E56B6B;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--text); font-family: var(--display); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 11px; }

  h1 { font-size: clamp(24px, 4vw, 34px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin: 0; }
  .sub { color: var(--dim); font-size: 14px; max-width: 62ch; line-height: 1.5; margin: 6px 0 0; }

  /* Fixed rows: the prompt swaps between a bullet and a long station name, and
     the map must not jump under the cursor between rounds. */
  .prompt {
    display: grid; grid-template-columns: 1fr auto; align-items: center;
    row-gap: 10px; column-gap: 16px;
    padding: 10px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .ask { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; min-height: 62px; }
  .askText { font-size: clamp(17px, 2.6vw, 24px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; text-wrap: balance; }
  .round { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }
  .stats { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 14px; color: var(--dim); }
  .stats b { color: var(--text); font-weight: 500; }

  .bullet {
    flex: none; width: 46px; height: 46px; border-radius: 50%;
    display: grid; place-items: center;
    font: 700 24px/1 var(--display); color: #fff; background: var(--bc, var(--dim));
  }
  .bullet.dark { color: #23201B; }   /* the yellow and light-grey bullets need dark type */
  .bullet.sm { width: 28px; height: 28px; font-size: 15px; }

  .stage { position: relative; }
  canvas { display: block; width: 100%; border: 1px solid var(--line); background: var(--water); cursor: crosshair; touch-action: none; }
  canvas.done { cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  .result { min-height: 44px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 15px; }
  .verdict { font-weight: 700; letter-spacing: -0.01em; }
  .verdict.good { color: #1E7A6E; }
  .verdict.bad { color: var(--miss); }
  .detail { color: var(--dim); font-family: var(--mono); font-size: 13px; }

  button {
    font: 600 11px/1 var(--display); letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text); background: transparent; border: 1px solid var(--line);
    border-radius: 2px; padding: 11px 13px; cursor: pointer;
  }
  button:hover { border-color: var(--text); }
  button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  button[aria-pressed="true"] { background: var(--text); color: var(--paper); border-color: var(--text); }
  button[hidden] { display: none; }

  .opts { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  /* On a phone the map is the page: shrink the furniture, and move the controls
     below the map so it starts higher and gets more height. */
  @media (max-width: 700px) {
    .wrap { padding: 14px 12px 40px; gap: 10px; }
    h1 { font-size: 23px; }
    .sub { font-size: 13px; line-height: 1.45; }
    .stage { order: 2; }
    .result { order: 3; }
    .opts { order: 4; }
    .tallies { order: 5; }
  }

  .opts .spacer { flex: 1; }
  .zoomlvl { font-family: var(--mono); font-size: 12px; color: var(--dim); min-width: 3.4em; text-align: right; }
</style>

<div class="wrap">
  <header>
    <h1>Pinpoint the Line</h1>
    <p class="sub">Every subway line is drawn, none are labeled. Hover to pick out a line, then click it. You don't need the exact station, just the right strand. 20 rounds.</p>
  </header>

  <div class="prompt">
    <span class="round" id="round">Round 1</span>
    <span class="ask"><span id="askBullet"></span><span class="askText" id="askText">Loading…</span></span>
    <span class="stats"><b id="hits">0</b> right &middot; avg miss <b id="avg">n/a</b></span>
  </div>

  <div class="opts">
    <button id="modeLine" aria-pressed="true">Name a train</button>
    <button id="modeStop" aria-pressed="false">Hard: name a stop</button>
    <span class="spacer"></span>
    <button id="zoomOut" aria-label="Zoom out">&minus;</button>
    <span class="zoomlvl" id="zoomlvl">1.0&times;</span>
    <button id="zoomIn" aria-label="Zoom in">+</button>
    <button id="reset">Reset view</button>
  </div>

  <div class="stage"><canvas id="map" aria-label="Map of the NYC subway network. Click along a line to answer, drag to pan, scroll to zoom."></canvas></div>

  <div class="result">
    <span class="verdict" id="verdict"></span>
    <span class="detail" id="detail"></span>
    <button id="confirm" hidden>Confirm</button>
    <button id="next" hidden>Next</button>
  </div>
</div>

<script>
const SUBWAY = /*SUBWAY*/;
// Neighborhood polygons, drawn faintly so the network has a shoreline. Staten
// Island is dropped: no subway reaches it, so it would hang off the corner of a
// view fitted to the tracks as a landmass with nothing on it.
const LAND = (/*DATA*/).filter(h => h.b !== "Staten Island");
const ROUNDS = 20;
// How close the pointer must be to grab a line. A fingertip is far blunter than
// a mouse cursor, so touch gets a wider radius.
const SNAP_PX = matchMedia("(pointer: coarse)").matches ? 24 : 14;

// Official bullet colours. The yellow and grey ones carry dark type.
const COLOR = {
  1: "#EE352E", 2: "#EE352E", 3: "#EE352E",
  4: "#00933C", 5: "#00933C", 6: "#00933C",
  7: "#B933AD",
  A: "#0039A6", C: "#0039A6", E: "#0039A6",
  B: "#FF6319", D: "#FF6319", F: "#FF6319", M: "#FF6319",
  G: "#6CBE45", J: "#996633", Z: "#996633",
  L: "#A7A9AC", S: "#808183",
  N: "#FCCC0A", Q: "#FCCC0A", R: "#FCCC0A", W: "#FCCC0A",
};
const DARK_TYPE = new Set(["N", "Q", "R", "W", "L"]);

const ROUTES = SUBWAY.routes;
const BY_ID = new Map(ROUTES.map(r => [r.r, r]));
// Hard mode is only a real test when the stop doesn't hand you the whole map:
// a 2-line stop makes you choose, Times Sq would not.
const STOPS = SUBWAY.stations.filter(s => s.r.length <= 2);

// "145 St" in Manhattan is four different stations on four different lines, and
// the prompt can't say which. Accept any line serving any station of that name.
const SERVED_BY = new Map();
for (const s of STOPS) {
  const k = `${s.n}|${s.b}`;
  const set = SERVED_BY.get(k) || SERVED_BY.set(k, new Set()).get(k);
  for (const id of s.r) set.add(id);
}
const acceptedFor = stop => [...SERVED_BY.get(`${stop.n}|${stop.b}`)];

const el = id => document.getElementById(id);
const cssVar = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const cv = el("map");
const ctx = cv.getContext("2d");

// ---- projection
let minX = 180, maxX = -180, minY = 90, maxY = -90;
for (const r of ROUTES) for (const l of r.p) for (const [x, y] of l) {
  if (x < minX) minX = x; if (x > maxX) maxX = x;
  if (y < minY) minY = y; if (y > maxY) maxY = y;
}
const KX = Math.cos((minY + maxY) / 2 * Math.PI / 180);

let scale = 1, offX = 0, offY = 0, zoom = 1, panX = 0, panY = 0, lastW = 0;
const px = ([x, y]) => [
  (offX + (x - minX) * KX * scale) * zoom + panX,
  (offY + (maxY - y) * scale) * zoom + panY,
];
function toLonLat([sx, sy]) {
  const bx = (sx - panX) / zoom, by = (sy - panY) / zoom;
  return [minX + (bx - offX) / (KX * scale), maxY - (by - offY) / scale];
}

// Vertical space the canvas can take without pushing the row below it off screen.
// Measure where the map starts (its distance from the document top, which the
// canvas's own height doesn't affect) and reserve for the row beneath it — a stable
// amount for the result, which grows once answered. Scroll-independent.
function fitHeight() {
  const stage = cv.closest(".stage");
  const gap = parseFloat(getComputedStyle(cv.closest(".wrap")).rowGap) || 0;
  const top = stage.getBoundingClientRect().top + window.scrollY;
  const below = stage.nextElementSibling;
  const reserve = below ? (below.classList.contains("result") ? 60 : below.offsetHeight) : 0;
  return innerHeight - top - reserve - gap - 8;
}

function layout() {
  const w = cv.clientWidth;
  lastW = w;
  // The network is tall and narrow, more so on a portrait phone.
  const narrow = w < 600;
  // Fit the map and the Next/result row on one screen: cap the height at the space
  // left in the viewport after the surrounding chrome, not a blind fraction of it.
  const h = Math.round(Math.min(w * (narrow ? 1.35 : 0.95), Math.max(120, fitHeight())));
  const dpr = devicePixelRatio || 1;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const pad = 12;
  scale = Math.min((w - pad * 2) / ((maxX - minX) * KX), (h - pad * 2) / (maxY - minY));
  offX = (w - (maxX - minX) * KX * scale) / 2;
  offY = (h - (maxY - minY) * scale) / 2;
  draw();
}

// ---- geometry. Distances in miles so the tolerance means the same thing at every zoom.
function segDist(p, a, b) {
  const px_ = (p[0] - a[0]) * KX, py = p[1] - a[1];
  const bx = (b[0] - a[0]) * KX, by = b[1] - a[1];
  const len = bx * bx + by * by;
  const t = len ? Math.max(0, Math.min(1, (px_ * bx + py * by) / len)) : 0;
  const nx = a[0] + (b[0] - a[0]) * t, ny = a[1] + (b[1] - a[1]) * t;
  return { d: Math.hypot(px_ - bx * t, py - by * t) * 69, at: [nx, ny] };
}
function nearestOn(pt, route) {
  let best = { d: Infinity, at: route.p[0][0] };
  for (const line of route.p)
    for (let i = 1; i < line.length; i++) {
      const s = segDist(pt, line[i - 1], line[i]);
      if (s.d < best.d) best = s;
    }
  return best;
}

// Same thing in screen pixels, for grabbing a line with the cursor. Pixels rather
// than miles here on purpose: the grab radius should feel identical at every zoom.
function segDistPx(p, a, b) {
  const bx = b[0] - a[0], by = b[1] - a[1];
  const len = bx * bx + by * by;
  const t = len ? Math.max(0, Math.min(1, ((p[0] - a[0]) * bx + (p[1] - a[1]) * by) / len)) : 0;
  return Math.hypot(p[0] - a[0] - bx * t, p[1] - a[1] - by * t);
}
// How much further than the nearest line a second line may be and still count as
// the same grab. Shared track is the case worth allowing: those lines sit on top of
// each other, so they tie. Without this, a tap in the Manhattan trunk on a phone
// screen grabs eighteen lines and any answer is right.
const TIE_PX = 3;

// Every route within grabbing distance, nearest first. More than one comes back
// where lines share track, and any of them is a fair answer there.
function routesAt(sx, sy) {
  const pt = [sx, sy];
  const found = [];
  for (const route of ROUTES) {
    let best = Infinity;
    for (const line of route.p) {
      let prev = px(line[0]);
      for (let i = 1; i < line.length; i++) {
        const cur = px(line[i]);
        const d = segDistPx(pt, prev, cur);
        if (d < best) best = d;
        prev = cur;
      }
    }
    if (best <= SNAP_PX) found.push({ route, d: best });
  }
  found.sort((a, b) => a.d - b.d);
  return found.length ? found.filter(f => f.d <= found[0].d + TIE_PX) : found;
}

// ---- state
// On touch there is no hover, and you cannot see the line under your fingertip.
// A tap previews which line it grabbed; you confirm or tap somewhere else.
const TOUCH = matchMedia("(pointer: coarse)").matches;
let pendingPt = null;
let round = 0, hits = 0, misses = [], target = null, answers = [], guess = null,
    answered = false, best = null, mode = "line", picked = null, hover = null;
let order = [];

function paintLine(route, width, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  for (const line of route.p) {
    ctx.beginPath();
    line.forEach((pt, i) => { const [a, b] = px(pt); i ? ctx.lineTo(a, b) : ctx.moveTo(a, b); });
    ctx.stroke();
  }
}

function draw() {
  const w = cv.clientWidth, h = parseFloat(cv.style.height);
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = cssVar("--land");
  for (const hood of LAND) {
    ctx.beginPath();
    for (const ring of hood.p) {
      ring.forEach((pt, i) => { const [a, b] = px(pt); i ? ctx.lineTo(a, b) : ctx.moveTo(a, b); });
      ctx.closePath();
    }
    ctx.fill();
  }

  // Every line in the same neutral: you can see the network, not which strand is which.
  const rail = cssVar("--rail");
  for (const route of ROUTES) paintLine(route, 2, rail);

  // The line under the cursor thickens so you can see what you're about to pick.
  // Still no colour and no name — that would give the round away.
  if (hover && !answered) paintLine(hover, 5, cssVar("--dim"));

  if (answered && answers.length) {
    const right = answers.includes(picked);
    // The wrong grab, so you can see which strand you actually took.
    if (!right && picked) paintLine(BY_ID.get(picked), 4, cssVar("--miss"));
    // Casing first. The L and S wear grey bullets that sit right on top of the
    // neutral network colour, so hue alone can't carry the highlight.
    for (const id of answers) paintLine(BY_ID.get(id), 8, cssVar("--text"));
    for (const id of answers) paintLine(BY_ID.get(id), 4.5, COLOR[id] || cssVar("--text"));
    if (guess) {
      const [gx, gy] = px(guess);
      if (!right && best) {
        const [nx, ny] = px(best.at);
        ctx.strokeStyle = cssVar("--miss");
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(nx, ny); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.fillStyle = right ? "#1E7A6E" : cssVar("--miss");
      ctx.beginPath(); ctx.arc(gx, gy, 5, 0, 7); ctx.fill();
    }
  }
  el("zoomlvl").textContent = zoom.toFixed(1) + "×";
}

// ---- rounds
function bullet(id, small) {
  const b = document.createElement("span");
  b.className = "bullet" + (small ? " sm" : "") + (DARK_TYPE.has(id) ? " dark" : "");
  b.style.setProperty("--bc", COLOR[id] || "#6E6757");
  b.textContent = id;
  return b;
}

function ask() {
  if (round >= order.length) return finish();
  target = order[round];
  guess = null; answered = false; best = null; picked = null; hover = null;
  answers = mode === "line" ? [target.r] : acceptedFor(target);
  cv.classList.remove("done");
  el("round").textContent = `Round ${round + 1} of ${order.length}`;
  el("askBullet").replaceChildren(mode === "line" ? bullet(target.r) : "");
  el("askText").textContent = mode === "line"
    ? "Click anywhere this train runs"
    : `Which line serves ${target.n}?`;
  el("verdict").textContent = ""; el("detail").textContent = "";
  el("next").hidden = true;
  window.hideShareBox && window.hideShareBox();
  el("confirm").hidden = true;
  pendingPt = null;
  draw();
}

el("confirm").addEventListener("click", () => {
  if (!pendingPt || answered) return;
  const [sx, sy] = pendingPt;
  el("confirm").hidden = true;
  place(sx, sy);
});

function place(sx, sy) {
  if (!target || answered) return;

  // You answer by grabbing a line, not by clicking a patch of map. Empty space
  // isn't a wrong answer, it's no answer — the round just stays open.
  const under = routesAt(sx, sy);
  if (!under.length) {
    el("verdict").textContent = "";
    el("detail").textContent = "Click on a line. The one under the cursor thickens.";
    return;
  }

  guess = toLonLat([sx, sy]);
  answered = true;
  hover = null;
  pendingPt = null;
  cv.classList.add("done");

  // Where lines share track several come back at once, and any accepted one counts.
  const grabbed = under.map(u => u.route.r);
  picked = grabbed.find(id => answers.includes(id)) || grabbed[0];
  const on = answers.includes(picked);

  best = answers.map(id => nearestOn(guess, BY_ID.get(id))).reduce((a, b) => (b.d < a.d ? b : a));
  if (on) hits++; else misses.push(best.d);

  el("verdict").textContent = on ? "Got it." : "Wrong line.";
  el("verdict").className = "verdict " + (on ? "good" : "bad");
  const named = answers.join(" or ");
  el("detail").textContent = on
    ? (mode === "line" ? `that's the ${picked}` : `${target.n} is on the ${named}`)
    : (mode === "line" ? `you picked the ${picked}. The ${target.r} is highlighted, ${best.d.toFixed(2)} mi away`
                       : `you picked the ${picked}. ${target.n} is on the ${named}`);
  el("hits").textContent = hits;
  el("avg").textContent = misses.length ? (misses.reduce((a, b) => a + b, 0) / misses.length).toFixed(2) + " mi" : "n/a";
  el("next").hidden = false;
  el("next").textContent = round + 1 >= order.length ? "See results" : "Next";
  el("next").onclick = () => { round++; ask(); };
  draw();
}

function finish() {
  target = null; answered = false;
  cv.classList.add("done");
  el("round").textContent = "Done";
  el("askBullet").replaceChildren();
  el("askText").textContent = `${hits} of ${order.length} lines identified`;
  el("detail").textContent = misses.length
    ? `average miss ${(misses.reduce((a, b) => a + b, 0) / misses.length).toFixed(2)} mi over ${misses.length}`
    : "perfect run";
  el("verdict").textContent = "";
  el("next").hidden = false;
  el("next").textContent = "Play again";
  el("next").onclick = () => restart();
  window.showShareBox && window.showShareBox(hits, order.length, "Pinpoint the Line");
  draw();
}

function restart() {
  const pool = mode === "line" ? ROUTES.map(r => ({ r: r.r, n: r.n })) : STOPS;
  order = pool.map(x => x).sort(() => Math.random() - 0.5).slice(0, ROUNDS);
  round = 0; hits = 0; misses = []; guess = null; answered = false; best = null; picked = null; hover = null;
  zoom = 1; panX = 0; panY = 0;
  el("hits").textContent = "0";
  el("avg").textContent = "n/a";
  layout();
  ask();
}

for (const [id, m] of [["modeLine", "line"], ["modeStop", "stop"]])
  el(id).addEventListener("click", () => {
    if (mode === m) return;
    mode = m;
    el("modeLine").setAttribute("aria-pressed", String(m === "line"));
    el("modeStop").setAttribute("aria-pressed", String(m === "stop"));
    restart();
  });

// ---- zoom + pan
function zoomAt(factor, cxp, cyp) {
  const next = Math.min(14, Math.max(1, zoom * factor));
  const k = next / zoom;
  panX = cxp - (cxp - panX) * k;
  panY = cyp - (cyp - panY) * k;
  zoom = next;
  clampPan();
  draw();
}
function clampPan() {
  const w = cv.clientWidth, h = parseFloat(cv.style.height);
  const span = 0.35 * Math.min(w, h);
  panX = Math.min(span, Math.max(w - w * zoom - span, panX));
  panY = Math.min(span, Math.max(h - h * zoom - span, panY));
  if (zoom === 1) { panX = 0; panY = 0; }
}
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  zoomAt(Math.exp(-e.deltaY * 0.0016), e.clientX - r.left, e.clientY - r.top);
}, { passive: false });
el("zoomIn").addEventListener("click", () => zoomAt(1.5, cv.clientWidth / 2, parseFloat(cv.style.height) / 2));
el("zoomOut").addEventListener("click", () => zoomAt(1 / 1.5, cv.clientWidth / 2, parseFloat(cv.style.height) / 2));
el("reset").addEventListener("click", () => { zoom = 1; panX = panY = 0; draw(); });

// Enter or Space advances (Confirm the pending pick, else Next). The button still
// works; skip when a button has focus so its native activation isn't doubled.
addEventListener("keydown", e => {
  if (e.key !== "Enter" && e.key !== " ") return;
  if (e.target.tagName === "BUTTON" || /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  const btn = !el("confirm").hidden ? el("confirm") : (!el("next").hidden ? el("next") : null);
  if (btn) { e.preventDefault(); btn.click(); }
});

// A drag pans; a press that barely moves is a guess.
const SLOP = 4;
let drag = null;
cv.addEventListener("pointerdown", e => {
  drag = { x: e.clientX, y: e.clientY, px: panX, py: panY, moved: false };
  cv.setPointerCapture(e.pointerId);
});
// Hover runs a scan over every segment, so keep it to one per frame.
let hoverQueued = false;
function updateHover(sx, sy) {
  if (hoverQueued) return;
  hoverQueued = true;
  requestAnimationFrame(() => {
    hoverQueued = false;
    if (answered || drag) return;
    const under = routesAt(sx, sy);
    const next = under.length ? under[0].route : null;
    if (next === hover) return;
    hover = next;
    cv.style.cursor = hover ? "pointer" : "crosshair";
    draw();
  });
}

cv.addEventListener("pointermove", e => {
  const r = cv.getBoundingClientRect();
  if (!drag) return updateHover(e.clientX - r.left, e.clientY - r.top);
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (!drag.moved && Math.hypot(dx, dy) < SLOP) return;
  drag.moved = true;
  cv.classList.add("dragging");
  panX = drag.px + dx; panY = drag.py + dy;
  clampPan();
  draw();
});
cv.addEventListener("pointerleave", () => { if (hover) { hover = null; draw(); } });
cv.addEventListener("pointerup", e => {
  const wasDrag = drag && drag.moved;
  drag = null;
  cv.classList.remove("dragging");
  if (wasDrag) return;
  const r = cv.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  if (!TOUCH) return place(sx, sy);
  if (answered) return;
  const under = routesAt(sx, sy);
  if (!under.length) {
    pendingPt = null;
    hover = null;
    el("confirm").hidden = true;
    el("detail").textContent = "Tap on a line. The one you pick lights up before it counts.";
    draw();
    return;
  }
  pendingPt = [sx, sy];
  hover = under[0].route;                 // show what the tap grabbed
  el("confirm").hidden = false;
  el("detail").textContent = "That line is highlighted. Confirm, or tap another.";
  draw();
});
cv.addEventListener("pointercancel", () => { drag = null; cv.classList.remove("dragging"); });

let pinch = null;
cv.addEventListener("touchmove", e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const [a, b] = e.touches;
  const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  const r = cv.getBoundingClientRect();
  if (pinch) zoomAt(d / pinch, (a.clientX + b.clientX) / 2 - r.left, (a.clientY + b.clientY) / 2 - r.top);
  pinch = d;
}, { passive: false });
cv.addEventListener("touchend", () => { pinch = null; });

new ResizeObserver(() => { if (cv.clientWidth !== lastW) layout(); }).observe(cv);
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", draw);
restart();

// ---- self-checks
console.assert(ROUTES.length >= 20, "routes loaded");
console.assert(ROUTES.every(r => COLOR[r.r]), "every route has a bullet colour");
console.assert(STOPS.length > 100, "enough one- and two-line stops for hard mode");
console.assert(STOPS.every(s => s.r.every(id => BY_ID.has(id))), "every hard-mode stop maps to a drawn line");
// A station must sit on its own line, or the quiz is unwinnable by design.
console.assert(STOPS.every(s => Math.min(...s.r.map(id => nearestOn(s.c, BY_ID.get(id)).d)) <= 0.12),
  "every stop sits on a line that serves it");
// Grabbing must work where it matters: a point taken off a route's own geometry
// has to return that route, and open water has to return nothing.
(() => {
  const r = ROUTES[0];
  const p = r.p[0][Math.floor(r.p[0].length / 2)];
  console.assert(routesAt(...px(p)).some(u => u.route === r), "a point on a line grabs that line");
  console.assert(routesAt(...px([-73.78, 40.50])).length === 0, "open water grabs nothing");
  // A line with its own corridor must resolve to exactly itself.
  const l = BY_ID.get("L");
  console.assert(routesAt(...px(l.p[0][Math.floor(l.p[0].length / 2)])).length === 1,
    "a line running alone grabs only itself");
  // And a grab must not routinely sweep up the system. One point proves nothing —
  // sample the network and check the middle of the distribution. Downtown, where
  // several trunks converge, still ties a dozen lines at 1x; that is what zoom is for.
  const counts = [];
  for (const route of ROUTES) for (const line of route.p) for (let i = 0; i < line.length; i += 40)
    counts.push(routesAt(...px(line[i])).length);
  counts.sort((a, b) => a - b);
  console.assert(counts[Math.floor(counts.length / 2)] <= 4, "a typical grab stays a grab, not a dragnet");
})();
// screen <-> lonlat must round-trip under zoom, or clicks score against the wrong spot
(() => {
  const [z0, x0, y0] = [zoom, panX, panY];
  zoom = 4.3; panX = -90; panY = 40;
  const pt = ROUTES[0].p[0][0];
  const back = toLonLat(px(pt));
  console.assert(Math.abs(back[0] - pt[0]) < 1e-6 && Math.abs(back[1] - pt[1]) < 1e-6,
    "toLonLat inverts px under zoom/pan");
  zoom = z0; panX = x0; panY = y0;
})();
</script>
